<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duolingo Simulator | Master New Languages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <nav>
                <div class="logo">LingoFlow</div>
                <div class="stats">
                    <span class="streak">🔥 0</span>
                    <span class="gems">💎 500</span>
                </div>
            </nav>
        </header>

        <main>
            <section id="welcome-screen">
                <div class="hero-content">
                    <h1>Ready for your daily <span class="highlight">language boost?</span></h1>
                    <p>Experience the world's most popular way to learn, simulated.</p>
                    <button id="start-btn" class="primary-btn">Let's Go!</button>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 DuolingoSimulator. Premium Edition.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
